name: Golang tests

on:
  push:
    paths:
      - "**.go"
  pull_request:
    paths:
      - "**.go"

permissions: {}

jobs:
  test:
    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
      - name: Get fuse bindings
        run: sudo apt update && sudo apt install --yes libfuse-dev  linux-libc-dev

      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: go.mod
        id: go

      - name: Build
        run: go build -v ./...

      - name: Run test and annotate
        uses: robherley/go-test-action@42a1975c97156330b5126c2f35ef0fb78c4c7154

      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          push: false
          tags: |
            ghcr.io/nbisweden/sdafs:latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.clone_url }}
            org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            org.opencontainers.image.revision=${{ github.sha }}
